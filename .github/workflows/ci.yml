name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-checks:
    name: Backend sandbox + matcher checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install check dependencies
        run: pip install sympy
      - name: Run verification checks (offline)
        run: python backend/scripts/check_code_verification.py

  frontend:
    name: Frontend typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        # No env vars in CI: the app builds in guest-only mode by design
        # (Supabase clients return null when unconfigured).
        run: npm run build
